<html>
<head>
  <!-- jQuery-->
  <script src="https://code.jquery.com/jquery-3.3.1.min.js" integrity="sha256-FgpCb/KJQlLNfOu91ta32o/NMZxltwRo8QtmkMRdAu8=" crossorigin="anonymous"></script>

  <!-- MaterializeCSS-->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/0.100.2/css/materialize.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/0.100.2/js/materialize.min.js"></script>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <style>
    @media screen and (max-width: 480px) {
      #getQuote, #tweet {
        width: 100%;
        margin-bottom: 20px;
        padding-bottom: 45px;
      }

      .left {
        float: none !important;
      }
    }
  </style>
</head>
<body>
  
  <div class="row container">
    <div class="col s12">
      <nav>
        <div class="nav container">
          <h4 href="#" style="text-align: center; padding-top: 10px">Quote Generator</h4>
        </div>
      </nav>

      <div class="card blue-grey darken-1" style="margin-top: 0">
        <div id="quote" class="card-content white-text"></div>
        <div class="card-action">
          <button id="getQuote" class="btn waves-effect waves-light"><i class="material-icons left">format_quote</i> Get Quote</button>
          <button id="tweet" class="btn waves-effect waves-light"><i class="material-icons left">send</i> Tweet</button>
        </div>
      </div>
    </div>
  </div>

  <script>
  $(document).ready(function() {

      var currentQuote;
      var currentAuthor;

      $("#getQuote").on("click", function(){
        
        var url = "http://quotes.stormconsultancy.co.uk/random.json";
        $.getJSON(url, function(a) {
          currentQuote = a.quote;
          currentAuthor = a.author;
          $("#quote").html("<div>" + a.quote + "<p>— " + a.author + "</p></div>");
        });
      });
    
      $("#tweet").on("click", function(){
        window.open('https://twitter.com/intent/tweet?text=' + encodeURIComponent('"' + currentQuote + '" ' + currentAuthor));
      });
    });
  </script>
</body>
</html>
